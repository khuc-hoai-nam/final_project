<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/static/style.css" rel="stylesheet" />
    <title>Nam Sport Shop</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">NAM SPORT</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/nam">NAM</a></li>
            <li class="nav-item"><a class="nav-link" href="/nu">NỮ</a></li>
            <li class="nav-item">
              <a class="nav-link" href="/phu-kien">PHỤ KIỆN</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            {% if session.user_id %}
            <li class="nav-item">
              <span class="nav-link text-warning fw-bold"
                >Chào, {{ session.username }}</span
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/logout">Thoát</a>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="/login">Đăng nhập</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/register">Đăng ký</a>
            </li>
            {% endif %}

            <li class="nav-item">
              <a class="nav-link" href="/cart">Giỏ hàng 🛒</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-4">{% block main %}{% endblock %}</main>

    <footer class="text-center mt-5 py-3 border-top">
      <p>&copy; 2026 Nam Sport Shop - Đồng hành cùng đam mê</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
